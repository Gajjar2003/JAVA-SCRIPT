<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        function Greater() {
            var n1 = prompt("Enter Your First number :")
            var n2 = prompt("Enter Your second number :")
            var n3 = n1 > n2
            alert(n3)
        }

          function less() {
            var n1 = prompt("Enter Your First number :")
            var n2 = prompt("Enter Your second number :")
            var n3 = n1 < n2
            alert(n3)
        }

          function Greaterequals() {
            var n1 = prompt("Enter Your First number :")
            var n2 = prompt("Enter Your second number :")
            var n3 = n1 >= n2
            alert(n3)
        }

          function lessequals() {
            var n1 = prompt("Enter Your First number :")
            var n2 = prompt("Enter Your second number :")
            var n3 = n1 <= n2
            alert(n3)
        }

          function Equals() {
            var n1 = prompt("Enter Your First number :")
            var n2 = prompt("Enter Your second number :")
            var n3 = n1 == n2
            alert(n3)
        }

          function Notequals() {
            var n1 = prompt("Enter Your First number :")
            var n2 = prompt("Enter Your second number :")
            var n3 = n1 != n2
            alert(n3)
        }
    </script>
            <button onclick="Greater()"> > </button>
            <button ondblclick="less()"> < </button>
            <button onclick="Greaterequals()"> >=</button>
            <button onclick=" lessequals()"> <= </button>
            <button onclick="Equals()"> == </button>
            <button onclick="Notequals()"> !=</button>



</body>

</html>
