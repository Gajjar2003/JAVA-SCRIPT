<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For-Loop</title>
</head>
<body>
      <h1>For Loops Example</h1>
       <fieldset>
        <legend>For Loops</legend>

        <input type="text" id="num1">

        <input type="button" value="Submit" onclick="forloop()">

        <div id="result"></div>
    </fieldset>
    <script>
        function forloop(){
            let num = document.getElementById('num1').value;
            let str="";
            for(let i=1;i<=10;i++){
                str+=`${num} X ${i} = ${num*i}<br>`
            }
            document.getElementById('result').innerHTML=str;
        }
    </script>
</body>
</html>
