<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>

        function alertitems() {
            alert("Hello World !!")
        }

        function promptitems() {
            let qty = prompt("Enter Your qty :")
            alert(qty)
        }

        function confirmitems(){
            let h = confirm("You are deleted your items")
            alert(h)
        }

    </script>
    <button onclick="alertitems()">Alert</button>
    <button onclick="promptitems()">Prompt</button>
    <button onclick="confirmitems()">Confirm</button>
</body>

</html>
