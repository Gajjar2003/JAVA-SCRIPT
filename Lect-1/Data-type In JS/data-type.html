<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date-type</title>
</head>

<body>
    <script>
        <!-- Number data-type -->
        let a = 100;
        console.log(a);
        console.log(typeof (a))

        // BigInt data-type

        let b = 157946745648945758785785484848444n;
        console.log(b);
        console.log(typeof (b))

        // String data-type

        let c = "jenil";
        let d = "Hello world";
        let e = "Javascript"


        console.log(c);
        console.log(e);
        console.log(d);
        console.log(typeof (c, d, e))

        // boolean data-type

        let g = true;
        let h = false

        console.log(g);
        console.log(h)
        console.log(typeof (g, h));


        // null value

        let age;
        console.log(age)
        console.log(typeof (age))

        // undefined value

        let Age = 100;
        Age = undefined
        console.log(Age);
        console.log(typeof (Age))













    </script>


</body>

</html>
