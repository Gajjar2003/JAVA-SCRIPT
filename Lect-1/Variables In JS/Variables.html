<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variables</title>
</head>
<body>
    <script>
        // var example

        var m = 100  //var variables use to can  redeclare and reassing
        console.log(m);

        var m = 200    // This is redeclare and reassing
        console.log(m);


        //  let examples
        

        let  n = 200  // let variables use to can not redeclare and reassing
        console.log(n)

        // let n=200;       this is redeclare 
        // console.log((n));
        
        let y=200           // this is reassing
        console.log(y);

        // const 

        const pi=3.14  // const variables to ues not redeclare and not reassings
        // pi = 14.5
        console.log(pi);

        
        
        
     
    </script>
</body>
</html>
