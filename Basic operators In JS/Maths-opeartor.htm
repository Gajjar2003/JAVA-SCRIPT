<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <fieldset>
        <legend>Simple Calc</legend>
        <label >Enter your num1</label>
        <input type="text" name="" id="num1">
        <br><br>
        <label >Enter your num2</label>
        <input type="text" name="" id="num2">
        <br><br>
        <input type="button" value="submit" onclick="simplecalc()">
        <div id="result"></div>
    </fieldset>
    <script>
        function simplecalc(){
            let num1 = +document.getElementById('num1').value;
            let num2 = +document.getElementById('num2').value;

            let str = `
                Add = ${num1+num2}<br>
                Sub = ${num1-num2}<br>
                Mul = ${num1*num2}<br>
                Div = ${num1/num2}<br>
                Mod = ${num1%num2}<br>
                Exp = ${num1**num2}<br>

            `
            document.getElementById('result').innerHTML=str;
        }
    </script>
</body>
</html>
