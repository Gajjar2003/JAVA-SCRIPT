<body>
    <script>
        class Product{
            constructor(name,price,qty,total){
                this._productdate = total;
                this.name = name;
                this.price = price;
                this.qty =qty;
            }
            get productdate(){
                return this._productdate;
            }
          printproduct(){
            console.log(`Name: ${this.name} Price: ${this.price} Qty: ${this.qty} Total: ${this.productdate}`);
          }
        }

        let p1 = new Product("Laptop",50000,2,100000);
        p1.printproduct();

        p1._productdate = 200000;
        p1.printproduct();
    </script>
</body>
