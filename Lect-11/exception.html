<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick = "CheckAuther()">Click Me</button>

    <script>
        class AutherCheck extends Error{
            constructor(message){
                super(message);
                this.name = "Authentication Falied";
            }
        }

        function CheckAuther(){
            try{
                let user = prompt("Enter Your Name");
                if(user != "admin"){
                    throw new AutherCheck("Invalid User");
                }
            }catch(error){
                console.log(error.name);
                console.log(error.message);
            }
        }
    </script>
</body>
</html>
