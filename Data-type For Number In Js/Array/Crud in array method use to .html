<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product CRUD App</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body class="bg-light">

    <div class="container py-5">

        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-4">

                <h2 class="text-center mb-4 text-primary">Product CRUD App</h2>

                <!-- Product Form -->
                <div class="row g-3">

                    <div class="col-md-4">
                        <input type="text" id="productName" class="form-control" placeholder="Enter Product Name" />
                    </div>

                    <div class="col-md-4">
                        <input type="number" id="productPrice" class="form-control" placeholder="Enter Product Price" />
                    </div>

                    <div class="col-md-4 d-grid">
                        <button class="btn btn-primary" id="addBtn" onclick="addProduct()">
                            Add Product
                        </button>
                        <button class="btn btn-primary" id="updateBtn" onclick="updateProduct()">
                            Update Product
                        </button>
                    </div>

                </div>

                <!-- Search -->
                <div class="mt-4">
                    <input type="number" id="productQty" class="form-control" placeholder="Enter Product qty" />
                </div>

                <!-- Product Table -->
                <div class="table-responsive mt-4">
                    <table class="table table-bordered table-hover text-center align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Product Name</th>
                                <th>Price</th>
                                <th>Quantity</th>
                                <th colspan="2">Actions</th>
                            </tr>
                        </thead>

                        <tbody id="productTable"></tbody>
                    </table>
                </div>

            </div>
        </div>

    </div>

    <script>

        let products = [];

        function addProduct() {

            let name = document.getElementById('productName').value;
            let price = document.getElementById('productPrice').value;
            let qty = document.getElementById('productQty').value;


            products.push(name, price, qty);

            productsShow();

            name = document.getElementById('productName').value = "";
            price = document.getElementById('productPrice').value = "";
            qty = document.getElementById('productQty').value = "";
        }

        function productsShow() {

            document.getElementById('addBtn').style.display = "block";
            document.getElementById('updateBtn').style.display = "none";

            let str = "";


            for (let i = 0; i < products.length; i += 3) {

                str += `
                <tr>
                    <td>${(i / 3) + 1}</td>
                    <td>${products[i]}</td>
                    <td>${products[i + 1]}</td>
                    <td>${products[i + 2]}</td>
                    <td><button onclick="deleteProduct(${i})">Delete</button></td>
                    <td><button onclick="editProduct(${i})">Edit</button></td>
                </tr>
            `;
            }

            document.getElementById('productTable').innerHTML = str;
        }

        function deleteProduct(id) {
            products.splice(id, 1);
            productsShow();
        }

        function editProduct(id) {
            document.getElementById('productName').value = products[id];
            document.getElementById('productPrice').value = products[id + 1];
            document.getElementById('productQty').value = products[id + 2];
            editid = id;
            document.getElementById('addBtn').style.display = "none";
            document.getElementById('updateBtn').style.display = "block";



        }

        function updateProduct() {
            let name = document.getElementById('productName').value;
            let price = document.getElementById('productPrice').value;
            let qty = document.getElementById('productQty').value;

            products.splice(editid, 3, name, price, qty);
            productsShow();

            name = document.getElementById('productName').value = "";
            price = document.getElementById('productPrice').value = "";
            qty = document.getElementById('productQty').value = "";
            editid = null;
        }
        window.onload = productsShow();

    </script>

</body>

</html>
