<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Generator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        fieldset {
            width: 40%;
            margin: 20px auto;
            padding: 20px;
        }

        input {
            width: 97%;
            padding: 10px;
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            cursor: pointer;
        }

        .result {
            width: 40%;
            margin: 20px auto;
            border: 2px solid #ccc;
            padding: 20px;
        }

        .item {
            border: 1px solid #ddd;
            padding: 10px;
            margin-top: 10px;
        }

        .remove-btn {
            background-color: red;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            width: auto;
        }
    </style>
</head>

<body>

    <h1 align="center">Invoice Generator</h1>

    <fieldset>
        <legend>Invoice Details</legend>

        <input type="text" id="num" placeholder="Invoice Number">

        <input type="date" id="date">

        <input type="text" id="name" placeholder="Customer Name">

        <input type="email" id="email" placeholder="Customer Email">

        <input type="text" id="phone" placeholder="Customer Phone">

        <input type="text" id="address" placeholder="Customer Address">

        <input type="text" id="pro-name" placeholder="Product Name">

        <input type="number" id="pro-qty" placeholder="Product Qty">

        <input type="number" id="pro-price" placeholder="Product Price">

        <button onclick="addItem()">Add Item</button>
    </fieldset>

    <div class="result">
        <h2>Invoice</h2>

        <p><b>Invoice No:</b> <span id="invoiceNo"></span></p>
        <p><b>Date:</b> <span id="invoiceDate"></span></p>
        <p><b>Name:</b> <span id="customerName"></span></p>
        <p><b>Email:</b> <span id="customerEmail"></span></p>
        <p><b>Phone:</b> <span id="customerPhone"></span></p>
        <p><b>Address:</b> <span id="customerAddress"></span></p>

        <hr>

        <div id="items"></div>

        <h3>Total Amount: ₹<span id="grandTotal">0</span></h3>
    </div>

    <script>

        let grandTotal = 0;

        function addItem() {

            let num = document.getElementById("num").value;
            let date = document.getElementById("date").value;
            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let phone = document.getElementById("phone").value;
            let address = document.getElementById("address").value;

            let productName = document.getElementById("pro-name").value;
            let qty = Number(document.getElementById("pro-qty").value);
            let price = Number(document.getElementById("pro-price").value);

            let total = qty * price;

            document.getElementById("invoiceNo").innerText = num;
            document.getElementById("invoiceDate").innerText = date;
            document.getElementById("customerName").innerText = name;
            document.getElementById("customerEmail").innerText = email;
            document.getElementById("customerPhone").innerText = phone;
            document.getElementById("customerAddress").innerText = address;

            let itemDiv = document.createElement("div");
            itemDiv.className = "item";

            itemDiv.innerHTML = `
        <p><b>Product:</b> ${productName}</p>
        <p><b>Qty:</b> ${qty}</p>
        <p><b>Price:</b> ₹${price}</p>
        <p><b>Total:</b> ₹${total}</p>
    `;

            let removeBtn = document.createElement("button");
            removeBtn.innerText = "Remove";
            removeBtn.className = "remove-btn";

            removeBtn.onclick = function () {

                grandTotal -= total;
                document.getElementById("grandTotal").innerText = grandTotal;

                itemDiv.remove();
            };

            itemDiv.appendChild(removeBtn);

            document.getElementById("items").appendChild(itemDiv);

            grandTotal += total;
            document.getElementById("grandTotal").innerText = grandTotal;



            document.getElementById("num").value = "";
            document.getElementById("date").value = "";
            document.getElementById("name").value = "";
            document.getElementById("email").value = "";
            document.getElementById("phone").value = "";
            document.getElementById("address").value = "";
            document.getElementById("pro-name").value = "";
            document.getElementById("pro-qty").value = "";
            document.getElementById("pro-price").value = "";
        }

    </script>

</body>

</html>
