<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date And Time Project</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }

        .clock-box {
            background: white;
            padding: 30px 50px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        #box {
            font-size: 28px;
            font-weight: bold;
            color: #0d6efd;
        }

        h2 {
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <div class="clock-box">
        <h2 class="text-primary">Current Date & Time</h2>
        <div id="box"></div>
    </div>

    <script>
        function ShowDate() {
            let date = new Date();

            let nameDate =
                `${date.getFullYear()}-${date.getMonth() + 1}-${date.getDate()} 
                ${date.getHours()}:${date.getMinutes()}:${date.getSeconds()}`;

            document.getElementById('box').textContent = nameDate;
        }

        ShowDate();
        setInterval(ShowDate, 1000);
    </script>

</body>

</html>
