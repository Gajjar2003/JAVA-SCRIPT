<!DOCTYPE html>
<html>
<head>
  <title>Counter App</title>

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f2f2f2;
      font-family: Arial, sans-serif;
    }

    .counter-box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0px 0px 10px gray;
    }

    h1 {
      font-size: 60px;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 20px;
      font-size: 20px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background-color: rgb(54, 214, 84);
      color: white;
    }

    button:hover {
      background-color: rgb(220, 16, 46);
    }

    h1:hover{
        color: red;
    }
  </style>
</head>

<body>

  <div class="counter-box">
    <h1>Counter App</h1>
    <h1 id="count">0</h1>

    <button onclick="increment()">+</button>
    <button onclick="decrement()">-</button>
  </div>

  <script>
    let count1 = 0;

    function increment() {
      count1++;
      document.getElementById("count").innerHTML = count1;
    }

    function decrement() {
      count1--;
      document.getElementById("count").innerHTML = count1;
    }
  </script>

</body>
</html>
